version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DATABASE_URL=file:./dev.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=supersecret123
      - JWT_SECRET=your_jwt_secret_here
      # - CLOUDINARY_URL=cloudinary://...
      # - SMTP_HOST=...
    volumes:
      - ./dev.db:/app/dev.db
      - ./public/pics:/app/public/pics
    restart: unless-stopped
